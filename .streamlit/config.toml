[theme]
base                     = "dark"
backgroundColor          = "#0f1117"
secondaryBackgroundColor = "#1a1f2e"
primaryColor             = "#4fc3f7"
textColor                = "#e2e8f0"
font                     = "sans serif"

[server]
headless             = true
enableCORS           = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false